name: knowyourmed
description: "KnowYourMed - Scan and understand medicine labels using OCR"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # OCR
  google_mlkit_text_recognition: ^0.13.0

  # Camera / Image
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  provider: ^6.1.2

  # File System
  path_provider: ^2.1.5

  # Shared Preferences (for settings)
  shared_preferences: ^2.3.3

  # Icons / UI
  cupertino_icons: ^1.0.8

  # UUID for unique IDs
  uuid: ^4.5.1

  # Intl for date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
